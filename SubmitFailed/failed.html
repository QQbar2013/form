<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送出失敗 | 話拳寒天Q棒訂購</title>
<style>
  :root{
    --orange:#ff6600;
    --orange-deep:#e25400;
    --ink:#2b2622;
    --muted:#7a716a;
    --paper:#fff8f3;
    --card:#ffffff;
    --line:#f0e3d8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #ffe9da 0%, var(--paper) 55%) no-repeat;
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;
    max-width:420px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:40px 28px 32px;
    text-align:center;
    box-shadow:0 18px 40px -20px rgba(226,84,0,.35);
  }
  .mark{
    width:76px;height:76px;
    margin:0 auto 22px;
    border-radius:50%;
    background:#fff1e8;
    display:flex;align-items:center;justify-content:center;
  }
  .mark svg{width:38px;height:38px;}
  .mark svg path{
    stroke:var(--orange);
    stroke-width:6;
    stroke-linecap:round;
    fill:none;
    stroke-dasharray:48;
    stroke-dashoffset:48;
    animation:draw .5s .15s ease forwards;
  }
  @keyframes draw{to{stroke-dashoffset:0;}}
  h1{
    font-size:22px;
    letter-spacing:.5px;
    margin-bottom:14px;
  }
  p{
    font-size:15px;
    line-height:1.85;
    color:var(--muted);
    margin-bottom:8px;
  }
  .note{
    margin:20px 0 28px;
    padding:14px 16px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:12px;
    font-size:13.5px;
    line-height:1.8;
    color:var(--muted);
    text-align:left;
  }
  .note strong{color:var(--orange-deep);font-weight:600;}
  .btn{
    display:block;
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:var(--orange);
    color:#fff;
    font-size:16px;
    font-weight:600;
    text-decoration:none;
    cursor:pointer;
    transition:background .15s ease, transform .05s ease;
  }
  .btn:hover{background:var(--orange-deep);}
  .btn:active{transform:scale(.99);}
  .btn:focus-visible{outline:3px solid #ffcaa6;outline-offset:2px;}
  .sub{
    margin-top:16px;
    font-size:13px;
    color:var(--muted);
  }
  @media (prefers-reduced-motion:reduce){
    .mark svg path{animation:none;stroke-dashoffset:0;}
  }
</style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 60 60">
        <path d="M20 20 L40 40 M40 20 L20 40"/>
      </svg>
    </div>

    <h1>訂單沒有送出</h1>
    <p>非常抱歉，方才系統可能忙線或中斷，<br>這筆訂單沒有成功送出🙇</p>

    <div class="note">
      您填寫的內容<strong>尚未被記錄</strong>,請重新填寫並再送出一次。<br>
      若多次送出都失敗，再麻煩您直接聯繫服務人員協助下單。
    </div>

    <a class="btn" id="backBtn" href="REPLACE_FORM_URL">返回重新填單</a>

    <p class="sub">服務人員服務時間 10:00–22:00</p>
  </main>

  <script>
    // 讀取網址上的 back 參數,作為「返回重新填單」的目的地
    // 例: failed.html?back=https%3A%2F%2F...你的填單頁完整網址(含 ?v=xxxx)
    (function () {
      var params = new URLSearchParams(window.location.search);
      var back = params.get("back");
      var btn = document.getElementById("backBtn");
      if (back) {
        try { back = decodeURIComponent(back); } catch (e) {}
        btn.setAttribute("href", back);
      }
      // 若沒帶 back 參數,按鈕維持 REPLACE_FORM_URL(請改成你的填單頁預設網址)
    })();
  </script>
</body>
</html>
